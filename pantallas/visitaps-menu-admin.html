<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VisitAPS – Menú Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

  .top-bar {
    width: 100%; height: 4px; flex-shrink: 0;
    background: var(--gold);
  }

  /* Top nav */
  .top-nav {
    width: 100%; padding: 14px 22px 0;
    display: flex; justify-content: flex-end; align-items: center;
    flex-shrink: 0; gap: 12px;
  }
  .nav-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0.55; transition: opacity 0.2s;
  }
  .nav-icon:hover { opacity: 1; }

  /* Main content */
  .content {
    flex: 1; width: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 0 52px;
    overflow: hidden;
  }

  /* Logo horizontal */
  .logo-wrap {
    margin-top: 32px;
    width: 200px; height: auto;
    display: flex; align-items: center; justify-content: center;
    animation: fadeDown 0.5s ease both;
  }
  .logo-wrap svg { width: 200px; height: auto; }

  /* Ornament */
  .ornament {
    display: flex; align-items: center; gap: 10px;
    width: 100%; margin-top: 24px;
    animation: fadeIn 0.5s 0.1s ease both;
  }
  .ornament-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .ornament-diamond {
    width: 5px; height: 5px; background: var(--gold);
    transform: rotate(45deg); flex-shrink: 0;
  }

  /* Title */
  .menu-title {
    font-family: 'Lora', serif;
    font-size: 22px; font-weight: 600;
    color: var(--text-main); text-align: center;
    margin-top: 28px;
    animation: fadeIn 0.5s 0.15s ease both;
  }

  /* Role badge */
  .role-badge {
    margin-top: 14px;
    margin-bottom: -10px;
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    animation: fadeIn 0.5s 0.2s ease both;
  }
  .role-badge.supervisor {
    background: var(--badge-teal-bg);
    color: var(--badge-teal-text);
  }
  .role-badge.admin {
    background: var(--badge-gold-bg);
    color: var(--badge-gold-text);
  }

  /* Buttons */
  .menu-buttons {
    width: 100%;
    display: flex; flex-direction: column;
    gap: 14px;
    margin-top: 36px;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .btn-menu {
    width: 100%; padding: 17px 20px;
    border: none; border-radius: 50px;
    background: var(--navy);
    color: #F0EDE8;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 4px 18px rgba(27,42,74,0.22);
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-menu:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-menu:active { transform: translateY(0); }

  /* Footer */
  .footer {
    width: 100%;
    padding: 0 52px 20px;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .footer-separator {
    width: 100%;
    height: 1px;
    background: var(--cream-dark);
    margin-bottom: 8px;
  }
  .logo-ministerio-wrap {
    height: 82px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-ministerio-wrap svg { height: 82px; width: auto; }
  .version {
    font-size: 10px; font-weight: 300;
    color: var(--text-soft); letter-spacing: 0.1em;
  }

  /* TyC link */
  .tyc-link {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--navy); opacity: 0.55;
    cursor: pointer; letter-spacing: 0.02em;
    transition: opacity 0.2s;
    margin-top: auto; margin-bottom: 0;
  }
  .tyc-link:hover { opacity: 1; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
</style>
