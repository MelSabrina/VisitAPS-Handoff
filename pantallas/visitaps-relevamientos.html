<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VisitAPS – Relevamientos</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

  

  

  .top-bar {
    width: 100%; height: 4px;
    background: var(--gold);
    flex-shrink: 0;
  }


  .top-nav {
    width: 100%; padding: 14px 22px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .btn-atras {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--navy); opacity: 0.7; padding: 0;
    transition: opacity 0.2s;
  }
  .btn-atras:hover { opacity: 1; }

  /* Page header */
  .page-header {
    width: 100%; padding: 18px 52px 0;
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0;
    animation: fadeDown 0.4s ease both;
  }
  .page-title {
    font-family: 'Lora', serif;
    font-size: 26px; font-weight: 600;
    color: var(--text-main); text-align: center;
  }
  .page-subtitle {
    font-family: 'Lora', serif;
    font-size: 13px; font-weight: 600;
    color: var(--navy); letter-spacing: 0.02em;
    text-align: center;
    margin-top: 4px;
  }

  /* Status legend */
  .status-legend {
    width: 100%; padding: 28px 52px 0;
    display: flex; align-items: center; gap: 16px;
    justify-content: center;
    flex-shrink: 0;
    animation: fadeIn 0.4s 0.1s ease both;
  }
  .legend-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 500; color: var(--text-soft);
  }
  .badge-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .badge-icon.enviado   { background: var(--navy); }
  .badge-icon.no-env    { background: var(--gold); }
  .badge-icon.borrador  { background: var(--steel); }
  .badge-icon.borrador svg { transform: translateY(-1px); }

  /* Search */
  .search-wrap {
    width: 100%; padding: 10px 52px 0;
    flex-shrink: 0;
    animation: fadeIn 0.4s 0.15s ease both;
  }
  .search-input {
    width: 100%;
    padding: 7px 4px;
    border: none;
    border-top: 1px solid #B8B4AE;
    border-bottom: 1px solid #B8B4AE;
    border-radius: 0;
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    font-size: 11.5px; font-weight: 300;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #9A9590; }
  .search-input:focus { border-color: var(--steel); }

  /* Scrollable list */
  .list-wrap {
    flex: 1; width: 100%;
    position: relative; min-height: 0;
    margin-top: 10px;
    margin-bottom: 96px;
  }
  .list-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 56px;
    background: linear-gradient(to bottom, transparent, var(--cream));
    pointer-events: none; z-index: 1;
  }
  .relev-list {
    width: 100%; height: 100%;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 20px;
  }
  .relev-list::-webkit-scrollbar { display: none; }

  .relev-item {
    display: flex; align-items: center;
    padding: 12px 52px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
    gap: 14px;
    animation: fadeIn 0.35s ease both;
  }
  .relev-item::after {
    content: '';
    position: absolute;
    bottom: 0; left: 52px; right: 52px;
    height: 1px; background: var(--cream-dark);
  }
  .relev-item:first-child::before {
    content: '';
    position: absolute;
    top: 0; left: 52px; right: 52px;
    height: 1px; background: var(--cream-dark);
  }
  .relev-item:hover { background: rgba(201,168,76,0.05); }
  .relev-item:active { background: rgba(201,168,76,0.10); }

  /* Status icon — bigger in list */
  .relev-status {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .relev-status.enviado   { background: var(--navy); }
  .relev-status.no-env    { background: var(--gold); }
  .relev-status.borrador  { background: var(--steel); opacity: 0.72; }

  .relev-info { flex: 1; min-width: 0; }
  .relev-name {
    font-size: 12px; font-weight: 700;
    color: var(--navy); line-height: 1.35;
  }
  .relev-sub {
    font-size: 10.5px; font-weight: 400;
    color: var(--text-soft); margin-top: 2px;
    line-height: 1.35;
  }
  .relev-chevron { flex-shrink: 0; opacity: 0.35; }

  /* FAB */
  .fab {
    position: absolute;
    bottom: 24px; right: 24px;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--teal);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(80,183,178,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
  }
  .fab:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(80,183,178,0.55); }
  .fab:active { transform: scale(0.97); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .nav-icon:hover { opacity: 1 !important; }
</style>
</head>
<body>
  <div class="top-bar"></div>


  <div class="top-nav">
    <button class="btn-atras">
      <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
        <path d="M6 1L1 6l5 5" stroke="#1B2A4A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Atras
    </button>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="nav-icon" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.55;transition:opacity 0.2s;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="7.5" r="3.5" stroke="#1B2A4A" stroke-width="1.5"/>
          <path d="M4 19.5c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nav-icon" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.55;transition:opacity 0.2s;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M9 3H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h5" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15 15l4-4-4-4M19 11H9" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title">Relevamientos</h1>
    <div class="page-subtitle" id="ronda-nom"></div>
  </div>

  <!-- Status legend -->
  <div class="status-legend">
    <div class="legend-badge">
      <div class="badge-icon enviado">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Enviado
    </div>
    <div class="legend-badge">
      <div class="badge-icon no-env">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
          <path d="M1.5 1.5l6 6M7.5 1.5l-6 6" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      No enviado
    </div>
    <div class="legend-badge">
      <div class="badge-icon borrador">
        <svg width="10" height="11" viewBox="0 0 11 12" fill="none">
          <rect x="1" y="1" width="9" height="10" rx="1.5" stroke="#fff" stroke-width="1.3"/>
          <line x1="3" y1="4" x2="8" y2="4" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="3" y1="6.5" x2="8" y2="6.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="3" y1="9" x2="6" y2="9" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      Borrador
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Buscar por Dirección del lote o Flia">
  </div>

  <!-- Scrollable relevamientos list -->
  <div class="list-wrap">
    <div class="relev-list" id="relev-list"></div>
  </div>

  <!-- FAB -->
  <button class="fab" title="Nuevo relevamiento">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M10 4v12M4 10h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>

</body>
</html>
