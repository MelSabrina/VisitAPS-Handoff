<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>VisitAPS – Rondas Sanitarias</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    margin: 0 auto;
    background: #C8C4BC;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  :root {
    --navy:       #1B2A4A;
    --navy-light: #243660;
    --gold:       #C9A84C;
    --gold-light: #D9BC72;
    --cream:      #EDEAE4;
    --cream-dark: #DDD9D2;
    --text-main:  #2C2C2C;
    --text-soft:  #7A7672;
    --gray-btn:   #8A8580;
  }

  

  

  .top-bar {
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 50%, var(--navy) 100%);
    flex-shrink: 0;
  }

  .status-bar {
    width: 100%;
    padding: 10px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 12px; font-weight: 600; color: var(--navy); letter-spacing: 0.05em; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { fill: var(--navy); opacity: 0.65; }

  .top-nav {
    width: 100%;
    padding: 14px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .btn-atras {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--navy); opacity: 0.7; padding: 0;
    transition: opacity 0.2s;
  }
  .btn-atras:hover { opacity: 1; }
  .logo-top-right { width: 90px; display: flex; align-items: center; }
  .logo-top-right svg { width: 100%; height: auto; }

  /* Fixed page header */
  .page-header {
    width: 100%;
    padding: 20px 52px 10px;
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0;
  }
  .page-title {
    font-family: 'Lora', serif;
    font-size: 24px; font-weight: 600;
    color: var(--text-main);
    text-align: center;
    line-height: 1.25;
    animation: fadeDown 0.45s ease both;
  }
  .ornament {
    display: flex; align-items: center; gap: 10px;
    width: 100%; margin-top: 14px;
    animation: fadeIn 0.5s 0.1s ease both;
  }
  .ornament-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .ornament-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg); flex-shrink: 0;
  }

  /* Scrollable list with fade */
  .list-wrap {
    flex: 1;
    width: 100%;
    position: relative;
    min-height: 0;
  }
  .list-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(to bottom, transparent, var(--cream));
    pointer-events: none;
    z-index: 1;
  }

  .rondas-list {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 0 16px;
  }
  .rondas-list::-webkit-scrollbar { display: none; }

  .ronda-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 52px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
    animation: fadeIn 0.4s ease both;
  }
  .ronda-item::after {
    content: '';
    position: absolute;
    bottom: 0; left: 52px; right: 52px;
    height: 1px;
    background: var(--cream-dark);
  }
  .ronda-item:first-child::before {
    content: '';
    position: absolute;
    top: 0; left: 52px; right: 52px;
    height: 1px;
    background: var(--cream-dark);
  }
  .ronda-item:hover { background: rgba(201,168,76,0.06); }
  .ronda-item:active { background: rgba(201,168,76,0.12); }

  .ronda-info { flex: 1; min-width: 0; }
  .ronda-id {
    font-size: 11.5px; font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
  }
  .ronda-sub {
    font-size: 10.5px; font-weight: 400;
    color: var(--text-soft);
    margin-top: 2px;
    line-height: 1.4;
  }
  .ronda-chevron { flex-shrink: 0; opacity: 0.35; }

  /* Bottom section — fixed */
  .bottom-section {
    width: 100%;
    padding: 16px 52px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .btn-action {
    width: 100%;
    padding: 15px 24px;
    border: none; border-radius: 50px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--navy);
    color: #F0EDE8;
    box-shadow: 0 4px 18px rgba(27,42,74,0.22);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-action:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-action:active { transform: translateY(0); }

  .memory-section {
    width: 100%;
    margin-top: 16px;
    padding-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .memory-title {
    font-family: 'Lora', serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-soft);
    margin-bottom: 10px;
  }
  .chart-wrap { width: 100px; height: 100px; }
  .chart-wrap svg { width: 100%; height: 100%; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 10px;
    width: 100%;
  }
  .legend-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .legend-row { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-label { font-size: 11.5px; font-weight: 500; color: var(--text-main); }
  .legend-pct { font-size: 12.5px; font-weight: 700; color: var(--navy); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="top-bar"></div>

  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4" y="5" width="3" height="6" rx="0.5"/><rect x="8" y="3" width="3" height="8" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
      <svg width="14" height="11" viewBox="0 0 14 11"><path d="M7 8.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6C4.8 4.7 6.3 4 7 4s2.2.7 3.5 2" stroke-width="1.2" stroke="currentColor" fill="none" stroke-linecap="round"/><path d="M1 3.5C2.9 1.6 4.9.5 7 .5s4.1 1.1 6 3" stroke-width="1.2" stroke="currentColor" fill="none" stroke-linecap="round"/></svg>
      <svg width="22" height="11" viewBox="0 0 22 11"><rect x="0" y="1" width="19" height="9" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1" y="2" width="14" height="7" rx="1.5" fill="currentColor"/><path d="M20 3.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div class="top-nav">
    <button class="btn-atras">
      <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
        <path d="M6 1L1 6l5 5" stroke="#1B2A4A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Atras
    </button>
    <div style="display:flex;gap:12px;align-items:center;">
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.55;transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.55">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="7.5" r="3.5" stroke="#1B2A4A" stroke-width="1.5"/>
          <path d="M4 19.5c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.55;transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.55">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 3H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h5" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15 15l4-4-4-4M19 11H9" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title">Rondas<br>sanitarias</h1>
  </div>

  <!-- Scrollable list -->
  <div class="list-wrap">
    <div class="rondas-list" id="rondas-list"></div>
  </div>

  <!-- Fixed bottom -->
  <div class="bottom-section">
    <button class="btn-action">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <path d="M12 16l-4-4h3V4h2v8h3l-4 4z" fill="#F0EDE8"/>
        <path d="M20 18H4" stroke="#F0EDE8" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Actualizar rondas
    </button>

    <div class="memory-section">
      <div class="memory-title">Espacio de memoria</div>
      <div class="chart-wrap">
        <svg id="pie-chart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-row">
            <div class="legend-dot" style="background:#1B2A4A"></div>
            <span class="legend-label">Disponible</span>
          </div>
          <span class="legend-pct" id="pct-disponible">—</span>
        </div>
        <div class="legend-item">
          <div class="legend-row">
            <div class="legend-dot" style="background:#C9A84C"></div>
            <span class="legend-label">Ocupado</span>
          </div>
          <span class="legend-pct" id="pct-ocupado">—</span>
        </div>
      </div>
    </div>
  </div>

</div>



</body>
</html>
