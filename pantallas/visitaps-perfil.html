<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>VisitAPS – Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    margin: 0 auto;
    background: #C8C4BC;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  :root {
    --navy:       #1B2A4A;
    --navy-light: #243660;
    --gold:       #C9A84C;
    --gold-light: #D9BC72;
    --cream:      #EDEAE4;
    --cream-dark: #DDD9D2;
    --text-main:  #2C2C2C;
    --text-soft:  #7A7672;
    --gray-btn:   #8A8580;
    --steel:      #5A7290;
    --steel-light:#6B84A3;
  }

  

  

  .phone::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(201,168,76,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .top-bar {
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 50%, var(--navy) 100%);
    flex-shrink: 0;
    position: relative; z-index: 1;
  }

  .status-bar {
    width: 100%;
    padding: 10px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 12px; font-weight: 600;
    color: var(--navy); letter-spacing: 0.05em;
  }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { fill: var(--navy); opacity: 0.65; }

  .top-nav {
    width: 100%;
    padding: 14px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .btn-atras {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    opacity: 0.7;
    padding: 0;
    transition: opacity 0.2s;
  }
  .btn-atras:hover { opacity: 1; }

  .logo-top-right {
    width: 90px;
    display: flex; align-items: center;
  }
  .logo-top-right svg { width: 100%; height: auto; }

  .content {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 52px 36px;
    position: relative; z-index: 1;
  }

  .page-title {
    font-family: 'Lora', serif;
    font-size: 24px; font-weight: 600;
    color: var(--text-main);
    text-align: center;
    margin-top: 24px;
    animation: fadeDown 0.45s ease both;
  }

  .ornament {
    display: flex; align-items: center; gap: 10px;
    width: 100%; margin-top: 14px;
    animation: fadeIn 0.5s 0.1s ease both;
  }
  .ornament-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .ornament-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg); flex-shrink: 0;
  }

  .profile-fields {
    width: 100%;
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  .field-row {
    padding: 8px 0;
    border-bottom: 1px solid var(--cream-dark);
  }
  .field-row:last-child { border-bottom: none; }

  .field-label {
    font-size: 10.5px;
    font-weight: 400;
    color: var(--text-soft);
    letter-spacing: 0.03em;
    margin-bottom: 2px;
  }

  .field-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.01em;
  }

  .action-buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 22px;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .btn-action {
    width: 100%;
    padding: 15px 24px;
    border: none;
    border-radius: 50px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }

  .btn-action.steel {
    background: var(--steel);
    color: #F0EDE8;
    box-shadow: 0 4px 18px rgba(90,114,144,0.25);
  }
  .btn-action.steel:hover {
    background: var(--steel-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(90,114,144,0.35);
  }

  .btn-action.gold {
    background: var(--gold);
    color: #1B2A4A;
    box-shadow: 0 4px 14px rgba(201,168,76,0.30);
  }
  .btn-action.gold:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .btn-action:active { transform: translateY(0); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
